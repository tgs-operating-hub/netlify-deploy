name: Era ICS to GHL calendar sync

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r era-calendar-sync/requirements.txt
      - env:
          GHL_PIT: ${{ secrets.GHL_PIT }}
          SYNC_WINDOW_DAYS: "30"
        run: python era-calendar-sync/sync.py
