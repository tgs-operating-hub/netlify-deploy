<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TGS Media | Inbox Command</title>
<style>
  :root{
    --bg:#08080a; --panel:#121216; --panel2:#17171c; --line:#26262d;
    --txt:#f4f4f6; --muted:#8c8c97; --accent:#19E37D;
    --green:#19E37D; --amber:#ffb020; --blue:#6b9bff; --red:#ff5c5c; --grey:#8c8c97;
    color-scheme: dark;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  .topbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;
    padding:16px 22px;border-bottom:1px solid var(--line);background:#050506;position:sticky;top:0;z-index:20;}
  .brand{display:flex;align-items:center;gap:14px;}
  .logo{font-weight:800;letter-spacing:2px;font-size:20px;}
  .logo .t{color:var(--txt);} .logo .accent{color:var(--accent);}
  .divider{width:1px;height:26px;background:var(--line);}
  .ttl{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);font-weight:700;}
  .ttl .big{display:block;font-size:15px;letter-spacing:1.5px;color:var(--txt);margin-top:2px;}
  .controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .search{background:var(--panel);border:1px solid var(--line);color:var(--txt);border-radius:8px;
    padding:8px 12px;font-size:13px;width:180px;outline:none;}
  .search:focus{border-color:var(--accent);}
  .gbtn{background:var(--accent);color:#04130b;text-decoration:none;font-weight:700;font-size:13px;
    padding:9px 15px;border-radius:8px;white-space:nowrap;border:none;cursor:pointer;}
  .gbtn:hover{filter:brightness(1.08);}
  .syncbtn{background:transparent;border:1px solid var(--accent);color:var(--accent);}
  .syncbtn:hover{background:rgba(25,227,125,.12);filter:none;}
  .statusline{padding:9px 22px;font-size:12px;color:var(--muted);border-bottom:1px solid var(--line);
    background:#0b0b0d;display:flex;gap:16px;flex-wrap:wrap;align-items:center;}
  .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--accent);margin-right:6px;vertical-align:middle;}
  .livebanner{margin:14px 22px 0;padding:12px 14px;border:1px solid var(--accent);border-radius:10px;
    background:rgba(25,227,125,.07);font-size:13px;display:none;}
  .livebanner h4{margin:0 0 6px;font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--accent);}
  .livebanner a{color:var(--blue);text-decoration:none;}
  .board{display:flex;gap:16px;padding:18px 22px 60px;overflow-x:auto;align-items:flex-start;}
  .col{flex:0 0 320px;background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden;}
  .col.collapsed .col-body{display:none;}
  .col-head{padding:14px 15px;border-bottom:1px solid var(--line);cursor:pointer;
    border-top:3px solid var(--grey);display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
  .col-head h3{margin:0;font-size:13px;text-transform:uppercase;letter-spacing:1.2px;font-weight:800;}
  .col-head .csub{font-size:11px;color:var(--muted);margin-top:3px;}
  .col-head .h-r{display:flex;align-items:center;gap:9px;}
  .countpill{background:var(--panel2);border:1px solid var(--line);border-radius:20px;padding:2px 10px;
    font-size:12px;font-weight:700;color:var(--txt);}
  .chev{color:var(--muted);font-size:14px;transition:transform .15s;}
  .col.collapsed .chev{transform:rotate(-90deg);}
  .col-body{padding:12px;display:flex;flex-direction:column;gap:11px;min-height:30px;}
  .card{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:12px 13px;
    transition:border-color .15s,opacity .15s;}
  .card:hover{border-color:#3a3a44;}
  .card.done{opacity:.45;}
  .card.done .c-subj{text-decoration:line-through;}
  .c-top{display:flex;align-items:center;gap:7px;margin-bottom:7px;flex-wrap:wrap;}
  .tag{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;padding:3px 7px;border-radius:5px;}
  .t-client{background:rgba(107,155,255,.16);color:#a9c4ff;}
  .t-prospect{background:rgba(25,227,125,.16);color:#7ff0bb;}
  .t-partner{background:rgba(193,140,255,.16);color:#d6b8ff;}
  .t-vendor{background:rgba(255,176,32,.16);color:#ffd089;}
  .t-team{background:rgba(255,255,255,.10);color:#d3d3da;}
  .t-flag{background:rgba(255,92,92,.16);color:#ffadad;}
  .c-subj{font-weight:700;font-size:13.5px;line-height:1.35;color:#fff;}
  .c-who{font-size:11.5px;color:var(--muted);margin-top:2px;}
  .c-snip{font-size:12.5px;color:#b9b9c2;margin-top:7px;line-height:1.45;}
  .c-note{margin-top:9px;font-size:11.5px;font-weight:600;color:var(--amber);}
  .c-note.ok{color:var(--green);}
  .actions{display:flex;align-items:center;gap:8px;margin-top:11px;flex-wrap:wrap;}
  .genbtn{background:var(--accent);color:#04130b;border:none;border-radius:7px;padding:7px 12px;
    font-size:12px;font-weight:800;cursor:pointer;}
  .genbtn:hover{filter:brightness(1.08);}
  .genbtn:disabled{opacity:.7;cursor:default;}
  .genbtn.created{background:#1f6b45;color:#cdebd9;}
  .c-foot{display:flex;align-items:center;justify-content:space-between;margin-top:11px;
    border-top:1px solid var(--line);padding-top:9px;}
  .c-foot a{font-size:12px;color:var(--blue);text-decoration:none;font-weight:600;}
  .c-foot a:hover{text-decoration:underline;}
  .chk{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--muted);cursor:pointer;user-select:none;}
  .chk input{accent-color:var(--accent);}
  .empty{color:var(--muted);font-size:12.5px;text-align:center;padding:14px 6px;}
  .autobox{padding:18px 14px;text-align:center;}
  .autobox .num{font-size:34px;font-weight:800;color:var(--muted);}
  .autobox .lbl{font-size:12px;color:var(--muted);margin-top:4px;}
  footer{padding:20px 22px 40px;color:#55555f;font-size:11px;text-align:center;}
  #toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);
    background:#1a1a20;border:1px solid var(--accent);color:var(--txt);padding:11px 18px;border-radius:10px;
    font-size:13px;opacity:0;transition:all .25s;z-index:50;pointer-events:none;max-width:90%;}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  ::-webkit-scrollbar{height:10px;width:10px;} ::-webkit-scrollbar-thumb{background:#2a2a31;border-radius:6px;}
</style>
</head>
<body>
  <div class="topbar">
    <div class="brand">
      <div class="logo"><span class="t">TGS</span> <span class="accent">MEDIA</span></div>
      <div class="divider"></div>
      <div class="ttl">Tactical Growth System<span class="big">INBOX COMMAND</span></div>
    </div>
    <div class="controls">
      <input id="search" class="search" placeholder="Filter cards...">
      <button class="gbtn syncbtn" id="syncBtn" onclick="syncNow(this)">Sync now</button>
      <a class="gbtn" href="https://mail.google.com/mail/u/0/#drafts" target="_blank" rel="noopener">Open Gmail Drafts</a>
    </div>
  </div>
  <div class="statusline">
    <span><span class="dot"></span><span id="modeLabel">Snapshot</span></span>
    <span id="genLabel"></span>
    <span id="tallyLabel"></span>
  </div>

  <div class="livebanner" id="liveBanner"></div>
  <div class="board" id="board"></div>
  <footer>Sync pulls your latest emails in. Click Draft Reply on a card to draft it in Gmail, then open Drafts and send. Nothing is ever sent automatically.</footer>
  <div id="toast"></div>

<script>
var GMAIL = "https://mail.google.com/mail/u/0/#";
var GM_SERVER = "mcp__541320f4-c73a-48fa-a5e6-b214b56b0fa1__";
function threadUrl(id){ return GMAIL + "inbox/" + id; }
function searchUrl(q){ return GMAIL + "search/" + encodeURIComponent(q); }

/*INBOX_DATA_START*/
window.INBOX_DATA = {

        ],

      {

        "cat": "flag",
        "subject": "Invoice INV-5717, AU$2,301.12",
        "snippet": "Call Genius Pro, was due 8 June.",
        "q": "INV-5717",
        "note": "Unpaid"
      },
      {
        "company": "Google Drive",
        "cat": "flag",
        "subject": "Two file access requests",
        "snippet": "Ayla wants TGS Clients Master File, Matt wants TGS_Revenue_May_2026.",
        "q": "requesting access",

      }
    ],
    "automatedCount": 23
  }

var COLS = [
  {key:"needsReply", title:"Needs a Reply", sub:"Click Draft Reply", color:"var(--green)"},
  {key:"routedTeam", title:"Routed to Team", sub:"Sales / Bernice", color:"var(--blue)"},
  {key:"flags", title:"Flags", sub:"Action, not email", color:"var(--red)"},
  {key:"automated", title:"Automated", sub:"FYI only", color:"var(--grey)"}
];

var LS_DONE = "tgs_inbox_done_v2";
var LS_COLLAPSE = "tgs_inbox_collapse_v2";
function getLS(k){ try{ return JSON.parse(localStorage.getItem(k) || "{}"); }catch(e){ return {}; } }
function setLS(k,v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }
function esc(t){ return (t==null?"":String(t)).replace(/[&<>"]/g, function(c){ return ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"})[c]; }); }
function keyOf(c){ return (c.company + "|" + c.subject).toLowerCase(); }

var CARD_INDEX = {};
var IDX = 0;

function cardHTML(c){
  var id = "c" + (IDX++);
  CARD_INDEX[id] = c;
  var k = keyOf(c);
  var done = getLS(LS_DONE)[k] ? " done" : "";
  var checked = getLS(LS_DONE)[k] ? "checked" : "";
  var link = c.threadId ? threadUrl(c.threadId) : (c.q ? searchUrl(c.q) : GMAIL + "inbox");
  var linkLabel = c.threadId ? "Open thread &rarr;" : "Find in Gmail &rarr;";
  var noteCls = c.ok ? "c-note ok" : "c-note";
  var actions = "";
  if(c.cat !== "flag"){
    actions = '<div class="actions"><button class="genbtn" onclick="draftReply(\'' + id + '\',this)">Draft Reply</button></div>';
  }
  var who = c.who ? '<div class="c-who">' + esc(c.who) + '</div>' : "";
  var note = c.note ? '<div class="' + noteCls + '">' + esc(c.note) + '</div>' : "";
  return '<div class="card' + done + '" data-id="' + id + '" data-key="' + esc(k) + '" data-text="' + esc((c.company + " " + c.subject + " " + (c.who||"") + " " + c.snippet).toLowerCase()) + '">' +
    '<div class="c-top"><span class="tag t-' + c.cat + '">' + esc(c.company) + '</span></div>' +
    '<div class="c-subj">' + esc(c.subject) + '</div>' + who +
    '<div class="c-snip">' + esc(c.snippet) + '</div>' + note + actions +
    '<div class="c-foot"><label class="chk"><input type="checkbox" ' + checked + ' onchange="toggleDone(\'' + esc(k) + '\',this)"> handled</label>' +
    '<a href="' + link + '" target="_blank" rel="noopener">' + linkLabel + '</a></div></div>';
}

function colHTML(col, cards){
  var collapsed = getLS(LS_COLLAPSE)[col.key] ? " collapsed" : "";
  var body, count;
  if(col.key === "automated"){
    count = window.INBOX_DATA.columns.automatedCount || 0;
    body = '<div class="autobox"><div class="num">' + count + '</div><div class="lbl">automated emails since the last sweep, no action needed</div></div>';
  } else {
    count = cards.length;
    body = cards.length ? cards.map(cardHTML).join("") : '<div class="empty">Nothing here.</div>';
  }
  return '<div class="col' + collapsed + '" data-key="' + col.key + '">' +
    '<div class="col-head" style="border-top-color:' + col.color + '" onclick="toggleCol(\'' + col.key + '\')">' +
    '<div><h3>' + col.title + '</h3><div class="csub">' + col.sub + '</div></div>' +
    '<div class="h-r"><span class="countpill">' + count + '</span><span class="chev">&#9660;</span></div></div>' +
    '<div class="col-body">' + body + '</div></div>';
}

function render(){
  IDX = 0; CARD_INDEX = {};
  var cols = window.INBOX_DATA.columns;
  document.getElementById("board").innerHTML = COLS.map(function(col){
    var cards = col.key === "automated" ? [] : (cols[col.key] || []);
    return colHTML(col, cards);
  }).join("");
  var nr = (cols.needsReply||[]).length, rt = (cols.routedTeam||[]).length, fl = (cols.flags||[]).length;
  document.getElementById("tallyLabel").textContent = nr + " to reply  ·  " + rt + " routed  ·  " + fl + " flags";
  var d = new Date(window.INBOX_DATA.generatedAt);
  document.getElementById("genLabel").textContent = "Snapshot from " + (isNaN(d.getTime()) ? window.INBOX_DATA.generatedAt : d.toLocaleString());
}

function toggleDone(k, input){
  var m = getLS(LS_DONE); if(input.checked) m[k]=1; else delete m[k]; setLS(LS_DONE, m);
  var card = input.closest(".card"); if(card) card.classList.toggle("done", input.checked);
}
function toggleCol(key){
  var m = getLS(LS_COLLAPSE); if(m[key]) delete m[key]; else m[key]=1; setLS(LS_COLLAPSE, m);
  var el = document.querySelector('.col[data-key="' + key + '"]'); if(el) el.classList.toggle("collapsed");
}
var TOAST_T;
function toast(msg){
  var t = document.getElementById("toast"); t.textContent = msg; t.classList.add("show");
  clearTimeout(TOAST_T); TOAST_T = setTimeout(function(){ t.classList.remove("show"); }, 4200);
}

async function callTool(name, args){
  var r = await window.cowork.callMcpTool(name, args);
  if(r && r.isError) throw new Error("tool");
  var d = r ? r.structuredContent : null;
  if(!d && r && r.content && r.content[0] && r.content[0].text){ d = JSON.parse(r.content[0].text); }
  return d || {};
}

var REPLY_RULES = "You are drafting an email reply AS Peter Te Hau, Founder of TGS Media. Output ONLY the email body text, nothing else. Rules: no signature, no sign-off, no name, because Gmail auto-appends his signature. Never use em dashes. Warm, direct, concise New Zealand business tone. Open with 'Hey <first name>,' for someone he knows, or 'Hi <first name>,' for a formal or first contact. ROUTING: if this is a sales inquiry or someone wanting services like ads, marketing, an AI receptionist or a voice bot, Peter never takes sales calls, so warmly hand them to his sales team and include this booking link for Keith or Ayla: https://api.leadconnectorhq.com/widget/bookings/ultimate-lead-conversion-call . If an existing client asks for a meeting with Peter, point them to the client WhatsApp group and note that Bernice (bernice@tgsmedia.org) arranges meetings. Otherwise reply normally and helpfully. If a price, number, date, or decision is needed that you cannot know, insert a clear [ FILL IN: ... ] placeholder. Keep it short unless it is a proposal.";

var DRAFT_KEY = "TGS-INBOX-7f3a9c2e";
function openCompose(c, body){
  var subj = /^re:/i.test(c.subject) ? c.subject : ("Re: " + c.subject);
  var u = "https://mail.google.com/mail/?view=cm&fs=1&to=" + encodeURIComponent((c.to||[]).join(","));
  if(c.cc && c.cc.length){ u += "&cc=" + encodeURIComponent(c.cc.join(",")); }
  u += "&su=" + encodeURIComponent(subj) + "&body=" + encodeURIComponent(body);
  window.open(u, "_blank", "noopener");
}
async function websiteDraft(c, btn){
  btn.disabled = true; btn.textContent = "Drafting...";
  try{
    var resp = await fetch("/api/draft", { method:"POST",
      headers:{ "content-type":"application/json", "x-tgs-key":DRAFT_KEY },
      body: JSON.stringify({ subject:c.subject, who:c.who, company:c.company, context:(c.context||c.snippet||"") }) });
    var data = await resp.json();
    if(!resp.ok || !data.body){ throw new Error(data.error || "no reply"); }
    openCompose(c, data.body);
    btn.textContent = "Opened in Gmail ✓"; btn.classList.add("created");
    setTimeout(function(){ btn.disabled=false; btn.textContent="Draft Reply"; btn.classList.remove("created"); }, 4000);
  }catch(e){
    btn.disabled=false; btn.textContent="Draft Reply";
    toast("Could not draft here: " + (e.message||e) + ". Opening the email in Gmail.");
    window.open(threadUrl(c.threadId), "_blank", "noopener");
  }
}

async function draftReply(id, btn){
  var c = CARD_INDEX[id]; if(!c) return;
  if(!(window.cowork && window.cowork.callMcpTool && window.cowork.askClaude)){
    return websiteDraft(c, btn);
  }
  btn.disabled = true; btn.textContent = "Drafting...";
  try{
    var t = await callTool(GM_SERVER + "get_thread", { threadId: c.threadId });
    var msgs = t.messages || []; var last = msgs.length ? msgs[msgs.length-1] : {};
    var ctx = "From: " + (last.sender || c.who || "") + "\nSubject: " + (c.subject || "") +
      "\n\nTheir message:\n" + String(last.plaintextBody || last.snippet || c.snippet || "").slice(0, 2500);
    var body = await window.cowork.askClaude(REPLY_RULES, [ctx]);
    if(body && typeof body === "object"){ body = body.text || body.completion || body.content || ""; }
    body = String(body || "").trim();
    if(!body){ throw new Error("empty"); }
    var subject = /^re:/i.test(c.subject) ? c.subject : ("Re: " + c.subject);
    var args = { to: c.to || [], subject: subject, body: body };
    if(c.cc && c.cc.length){ args.cc = c.cc; }
    if(c.replyTo){ args.replyToMessageId = c.replyTo; }
    var res = await window.cowork.callMcpTool(GM_SERVER + "create_draft", args);
    if(res && res.isError){ throw new Error("draft"); }
    btn.textContent = "Draft created ✓"; btn.classList.add("created");
    toast("Reply drafted in Gmail. Open Drafts to review and send.");
  }catch(e){
    btn.disabled = false; btn.textContent = "Draft Reply";
    toast("Could not auto-draft here. Opening the email in Gmail.");
    window.open(threadUrl(c.threadId), "_blank", "noopener");
  }
}

function syncNow(btn){
  if(window.cowork && window.cowork.runScheduledTask){
    btn.disabled = true; btn.textContent = "Syncing...";
    try{ window.cowork.runScheduledTask("morning-inbox-brief"); }catch(e){}
    toast("Sync started. Watch the Cowork chat for the brief. The live dashboard updates in about two minutes.");

    btn.disabled = true; btn.textContent = "Refreshing...";
    toast("Pulling the latest published board...");
    setTimeout(function(){ location.href = location.pathname + "?t=" + Date.now(); }, 600);
  }
}

async function liveRefresh(){
  if(!(window.cowork && window.cowork.callMcpTool)){ return; }
  document.getElementById("modeLabel").textContent = "Live (Cowork)";
  try{
    var known = {};
    var cols = window.INBOX_DATA.columns;
    ["needsReply","routedTeam"].forEach(function(kk){ (cols[kk]||[]).forEach(function(c){ if(c.threadId) known[c.threadId]=1; }); });
    var d = await callTool(GM_SERVER + "search_threads", { query: "in:inbox newer_than:2d -from:me", pageSize: 40 });
    var fresh = [];
    (d.threads||[]).forEach(function(t){
      var m = t.messages || []; if(!m.length) return;
      var last = m[m.length-1]; var snd = last.sender || "";
      if(snd.indexOf("peter@tgsmedia.org")!==-1 || isNoise(snd)) return;
      if(known[t.id]) return;
      var cc = classify(snd);
      fresh.push({ co: cc[1], subject: last.subject || "(no subject)", id: t.id });
    });
    if(fresh.length){
      var b = document.getElementById("liveBanner"); b.style.display = "block";
      b.innerHTML = "<h4>" + fresh.length + " new since this snapshot</h4>" +
        fresh.slice(0,12).map(function(f){ return "<div>&bull; <b>" + esc(f.co) + "</b> &mdash; " + esc(f.subject) +
          ' <a href="' + threadUrl(f.id) + '" target="_blank" rel="noopener">open &rarr;</a></div>'; }).join("");
    }
    document.getElementById("modeLabel").textContent = "Live (Cowork) · refreshed";
  }catch(e){ }
}
liveRefresh();
